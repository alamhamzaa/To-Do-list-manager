<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> To-Do Manager</title>

<style>
:root {
  --bg: #f5f7fa;
  --card: #fff;
  --text: #000;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2c2c2c;
  --text: #fff;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  width: 90%;
  max-width: 450px;
  margin: 40px auto;
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
}

.input-section {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.add-btn { background: #4CAF50; color: white; }
.dark-btn { background: #333; color: white; }

.filters {
  margin-top: 10px;
  text-align: center;
}

.filters button {
  margin: 5px;
  background: #2196F3;
  color: white;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #ddd;
  margin: 10px 0;
  padding: 10px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: grab;
}

body.dark li {
  background: #444;
}

.completed span {
  text-decoration: line-through;
  color: gray;
}

small {
  display: block;
  font-size: 10px;
}

.actions button {
  margin-left: 5px;
}

.edit { background: orange; }
.delete { background: red; color: white; }
</style>
</head>

<body>

<div class="container">
  <h1>📝 To-Do list</h1>

  <div class="input-section">
    <input id="taskInput" placeholder="Enter task...">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <button class="dark-btn" onclick="toggleDark()">🌙 Toggle Dark Mode</button>

  <div class="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('completed')">Done</button>
    <button onclick="setFilter('pending')">Pending</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";
let dragIndex = null;

const save = () => localStorage.setItem("tasks", JSON.stringify(tasks));

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();
  if (!text) return alert("Enter task!");

  tasks.push({
    text,
    completed: false,
    time: new Date().toLocaleString()
  });

  input.value = "";
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks
    .filter(t => filter === "all" || (filter === "completed" ? t.completed : !t.completed))
    .forEach((task, i) => {
      const li = document.createElement("li");
      li.draggable = true;
      li.className = task.completed ? "completed" : "";

      li.innerHTML = `
        <div onclick="toggle(${i})">
          <span>${task.text}</span>
          <small>${task.time}</small>
        </div>
        <div class="actions">
          <button class="edit" onclick="edit(${i})">✏️</button>
          <button class="delete" onclick="del(${i})">🗑️</button>
        </div>
      `;

      // Drag events
      li.ondragstart = () => dragIndex = i;
      li.ondragover = e => e.preventDefault();
      li.ondrop = () => swap(i);

      list.appendChild(li);
    });
}

function toggle(i) {
  tasks[i].completed = !tasks[i].completed;
  save();
  render();
}

function del(i) {
  tasks.splice(i, 1);
  save();
  render();
}

function edit(i) {
  const newText = prompt("Edit task:", tasks[i].text);
  if (newText) {
    tasks[i].text = newText;
    save();
    render();
  }
}

function setFilter(f) {
  filter = f;
  render();
}

function swap(i) {
  [tasks[i], tasks[dragIndex]] = [tasks[dragIndex], tasks[i]];
  save();
  render();
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

// Initial load
render();
</script>

</body>
</html>
